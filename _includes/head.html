<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
{% seo %}
<style>
  :root {
    --color-primary: {{ site.design.color_primary }};
    --color-primary-dark: {{ site.design.color_primary_dark }};
    --color-bg: {{ site.design.color_bg }};
    --color-surface: {{ site.design.color_surface }};
    --color-text: {{ site.design.color_text }};
    --color-muted: {{ site.design.color_muted }};
    --color-border: {{ site.design.color_border }};
    --color-success: {{ site.design.color_success }};
    --color-error: {{ site.design.color_error }};
    --color-warning: {{ site.design.color_warning }};
    --border-radius: {{ site.design.border_radius }};
    --font-family: {{ site.design.font_family }};
  }

  /* Reset & Base */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-family);
    background-color: var(--color-bg);
    color: var(--color-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--color-primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  .site-header {
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    display: flex; justify-content: space-between; align-items: center; height: 80px; padding: 0 48px; max-width: 1200px; margin: 0 auto;
  }
  .logo { font-weight: 800; font-size: 20px; color: var(--color-primary); text-decoration: none; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--color-text); }
  .logo:hover { text-decoration: none; }

  /* Nav */
  .site-nav ul { list-style: none; display: flex; gap: 32px; }
  .site-nav a { color: var(--color-muted); font-size: 14px; font-weight: 500; }
  .site-nav a:hover, .site-nav a.active { color: var(--color-primary); text-decoration: none; }
  .nav-toggle, .nav-toggle-label { display: none; }

  /* Mobile Nav */
  @media (max-width: 768px) {
    .nav-toggle-label { display: block; cursor: pointer; }
    .nav-toggle-label span, .nav-toggle-label span::before, .nav-toggle-label span::after {
      display: block; background: var(--color-text); height: 2px; width: 24px; position: relative;
    }
    .nav-toggle-label span::before, .nav-toggle-label span::after { content: ''; position: absolute; }
    .nav-toggle-label span::before { bottom: 7px; }
    .nav-toggle-label span::after { top: 7px; }
    .site-nav {
      position: absolute; top: 70px; left: 0; right: 0; background: var(--color-bg);
      border-bottom: 1px solid var(--color-border); display: none; padding: 20px;
    }
    .site-nav ul { flex-direction: column; gap: 15px; }
    .nav-toggle:checked ~ .site-nav { display: block; }
  }

  /* Hero */
  .hero { padding: 80px 48px; background: var(--color-bg); }
  .hero .container { max-width: 1200px; margin: 0 auto; text-align: left; }
  .hero h1 { font-size: 56px; line-height: 1.1; font-weight: 800; margin-bottom: 24px; letter-spacing: -2px; }
  .hero p { font-size: 18px; color: var(--color-muted); margin-bottom: 32px; max-width: 440px; }
  .hero-actions { display: flex; gap: 16px; justify-content: flex-start; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: var(--border-radius);
    font-weight: 600; text-align: center; cursor: pointer; transition: opacity 0.2s;
    border: none; font-size: 16px;
  }
  .btn:hover { text-decoration: none; opacity: 0.9; }
  .btn-primary { background: var(--color-primary); color: white; }
  .btn-primary:hover { color: white; }
  .btn-secondary { background: white; color: var(--color-text); border: 1px solid var(--color-border); }

  /* Features */
  .features { padding: 80px 0; }
  .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
  .feature-card { background: var(--color-surface); border: 1px solid var(--color-border); padding: 24px; border-radius: var(--border-radius); }
  .feature-icon { font-size: 2rem; margin-bottom: 16px; }
  .feature-card h3 { margin-bottom: 8px; font-size: 16px; font-weight: 600; }
  .feature-card p { color: var(--color-muted); font-size: 14px; }

  /* Steps */
  .step-card {
    display: flex; gap: 20px; background: white; border: 1px solid var(--color-border);
    padding: 24px; border-radius: 8px; margin-bottom: 20px;
  }
  .step-number {
    width: 32px; height: 32px; background: var(--color-primary); color: white;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold; flex-shrink: 0;
  }
  .step-content h3 { margin-bottom: 8px; font-size: 16px; font-weight: 600; }
  .step-content p { color: var(--color-muted); margin-bottom: 15px; font-size: 14px; }
  .code-block {
    background: #1A1A2E; color: #fff; padding: 15px; border-radius: 8px;
    display: flex; justify-content: space-between; align-items: center; gap: 15px;
    overflow-x: auto;
  }
  .code-block code { font-family: monospace; font-size: 0.9rem; white-space: nowrap; }
  .copy-btn {
    background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 0.8rem; flex-shrink: 0;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.2); }
  .copy-btn.copied { background: var(--color-success); }

  /* Prerequisites */
  .prereq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .prereq-card { background: var(--color-surface); padding: 20px; border-radius: var(--border-radius); display: flex; gap: 15px; align-items: flex-start; }
  .prereq-icon { font-size: 1.5rem; }
  .prereq-content h4 { margin-bottom: 5px; font-size: 1rem; }
  .prereq-content p { font-size: 0.9rem; color: var(--color-muted); margin: 0; }

  /* FAQ */
  .faq { margin-top: 60px; }
  .faq details {
    background: var(--color-surface); border-radius: var(--border-radius);
    margin-bottom: 10px; overflow: hidden;
  }
  .faq summary {
    padding: 20px; font-weight: 600; cursor: pointer; list-style: none;
    display: flex; justify-content: space-between; align-items: center;
  }
  .faq summary::-webkit-details-marker { display: none; }
  .faq summary::after { content: '+'; color: var(--color-primary); font-size: 1.5rem; }
  .faq details[open] summary::after { content: '−'; }
  .faq .faq-answer { padding: 0 20px 20px; color: var(--color-muted); }

  /* Page Layout */
  .page-container { padding: 60px 20px; max-width: 800px; }
  .page-header { margin-bottom: 40px; text-align: center; }
  .page-header h1 { font-size: 2.5rem; margin-bottom: 15px; }
  .page-description { font-size: 1.2rem; color: var(--color-muted); }
  .page-content h2 { margin: 40px 0 20px; }
  .page-content p { margin-bottom: 20px; }
  .page-content ul, .page-content ol { margin-bottom: 20px; padding-left: 20px; }
  .page-content li { margin-bottom: 10px; }

  /* Connection Test Form */
  .test-form { background: #1A1A2E; color: white; padding: 24px; border-radius: var(--border-radius); border: none; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; margin-bottom: 4px; opacity: 0.6; font-weight: normal; }
  .form-control {
    width: 100%; padding: 10px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    color: white; font-size: 13px; font-family: monospace;
  }
  .form-control:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(91, 110, 245, 0.2); }
  .password-wrapper { position: relative; }
  .toggle-password {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.6);
  }
  .test-result { margin-top: 20px; padding: 12px; border-radius: 8px; display: none; font-size: 13px; }
  .test-result.success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--color-success); color: var(--color-success); display: block; }
  .test-result.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--color-error); color: var(--color-error); display: block; }
  .test-result h3 { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; }
  .test-result.success h3 { color: var(--color-success); }
  .test-result.error h3 { color: var(--color-error); }
  .test-result details { margin-top: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; color: white; }
  .test-result summary { cursor: pointer; font-weight: 500; margin-bottom: 8px; }
  .test-result pre { background: rgba(0,0,0,0.3); color: #fff; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }

  /* Footer */
  .site-footer { background: white; padding: 48px 48px 24px; margin-top: 80px; border-top: 1px solid var(--color-border); }
  .footer-inner { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px; max-width: 1200px; margin-left: auto; margin-right: auto; }
  .footer-col h3 { margin-bottom: 20px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; opacity: 0.8; }
  .footer-col p, .footer-col a { color: var(--color-muted); font-size: 13px; }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 10px; }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 24px; border-top: 1px solid var(--color-border); color: var(--color-muted); font-size: 12px; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 768px) {
    .footer-bottom { flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
