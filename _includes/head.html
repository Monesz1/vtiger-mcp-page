<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
{% seo %}
<style>
  :root {
    --color-primary: {{ site.design.color_primary }};
    --color-primary-dark: {{ site.design.color_primary_dark }};
    --color-bg: {{ site.design.color_bg }};
    --color-surface: {{ site.design.color_surface }};
    --color-text: {{ site.design.color_text }};
    --color-muted: {{ site.design.color_muted }};
    --color-border: {{ site.design.color_border }};
    --color-success: {{ site.design.color_success }};
    --color-error: {{ site.design.color_error }};
    --color-warning: {{ site.design.color_warning }};
    --border-radius: {{ site.design.border_radius }};
    --font-family: {{ site.design.font_family }};
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }
  .animate-fade-in-up {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .animate-fade-in-up.delay-1 { animation-delay: 0.1s; }
  .animate-fade-in-up.delay-2 { animation-delay: 0.2s; }
  .animate-fade-in-up.delay-3 { animation-delay: 0.3s; }
  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Reset & Base */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-family);
    background-color: var(--color-bg);
    color: var(--color-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--color-primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  .site-header {
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    display: flex; justify-content: space-between; align-items: center; height: 80px; padding: 0 48px; max-width: 1200px; margin: 0 auto;
  }
  .logo { font-weight: 800; font-size: 20px; color: var(--color-primary); text-decoration: none; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--color-text); }
  .logo:hover { text-decoration: none; }

  /* Nav */
  .site-nav ul { list-style: none; display: flex; gap: 32px; }
  .site-nav a { color: var(--color-muted); font-size: 14px; font-weight: 500; }
  .site-nav a:hover, .site-nav a.active { color: var(--color-primary); text-decoration: none; }
  .nav-toggle, .nav-toggle-label { display: none; }

  /* Mobile Nav */
  @media (max-width: 768px) {
    .nav-toggle-label { display: block; cursor: pointer; }
    .nav-toggle-label span, .nav-toggle-label span::before, .nav-toggle-label span::after {
      display: block; background: var(--color-text); height: 2px; width: 24px; position: relative;
    }
    .nav-toggle-label span::before, .nav-toggle-label span::after { content: ''; position: absolute; }
    .nav-toggle-label span::before { bottom: 7px; }
    .nav-toggle-label span::after { top: 7px; }
    .site-nav {
      position: absolute; top: 70px; left: 0; right: 0; background: var(--color-bg);
      border-bottom: 1px solid var(--color-border); display: none; padding: 20px;
    }
    .site-nav ul { flex-direction: column; gap: 15px; }
    .nav-toggle:checked ~ .site-nav { display: block; }
  }

  /* Hero */
  .hero-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 48px; padding: 48px; align-items: center; max-width: 1200px; margin: 0 auto; }
  .steps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .widgets-container { display: flex; flex-direction: column; gap: 24px; }
  .connection-tester { background: #0F1626; color: white; border: 1px solid #1F2937; border-radius: 12px; padding: 32px; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4), 0 8px 10px -6px rgb(0 0 0 / 0.4); }
  .cta-group { display: flex; gap: 16px; }
  .hero { padding: 80px 48px; background: var(--color-bg); }
  .hero .container { max-width: 1200px; margin: 0 auto; text-align: left; }
  .hero h1 { font-size: 56px; line-height: 1.1; font-weight: 800; margin-bottom: 24px; letter-spacing: -2px; color: #0F172A; }
  .hero p { font-size: 18px; color: var(--color-muted); margin-bottom: 32px; max-width: 440px; }
  .hero-actions { display: flex; gap: 16px; justify-content: flex-start; flex-wrap: wrap; }
  
  @media (max-width: 768px) {
    .hero-layout, .steps-grid { grid-template-columns: 1fr; padding: 20px; }
    .hero-layout { gap: 32px; }
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: var(--border-radius);
    font-weight: 600; text-align: center; cursor: pointer; transition: all 0.2s;
    border: none; font-size: 15px; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  }
  .btn:hover { text-decoration: none; transform: translateY(-1px); }
  .btn-primary { background: var(--color-primary); color: white; }
  .btn-primary:hover { background: var(--color-primary-dark); color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
  .btn-secondary { background: white; color: var(--color-text); border: 1px solid var(--color-border); }
  .btn-secondary:hover { background: #F1F5F9; }

  /* Features */
  .features { padding: 40px 0 80px 0; }
  .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; }
  .feature-card { background: var(--color-surface); border: 1px solid var(--color-border); padding: 24px; border-radius: var(--border-radius); box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
  .feature-icon { font-size: 2rem; margin-bottom: 16px; color: var(--color-primary); }
  .feature-card h3 { margin-bottom: 8px; font-size: 16px; font-weight: 600; color: #0F172A; }
  .feature-card p { color: var(--color-muted); font-size: 14px; line-height: 1.6; }

  /* Steps */
  .step-card {
    display: flex; gap: 20px; background: white; border: 1px solid var(--color-border);
    padding: 24px; border-radius: var(--border-radius); margin-bottom: 20px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
  }
  .step-number {
    width: 36px; height: 36px; background: #E0E7FF; color: var(--color-primary);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex-shrink: 0; border: 1px solid #C7D2FE;
  }
  .step-content h3 { margin-bottom: 8px; font-size: 18px; font-weight: 600; color: #0F172A; }
  .step-content p { color: var(--color-muted); margin-bottom: 15px; font-size: 15px; line-height: 1.6; }
  .code-block {
    background: #F8FAFC; color: #334155; padding: 16px; border-radius: var(--border-radius);
    display: flex; justify-content: space-between; align-items: center; gap: 15px;
    overflow-x: auto; border: 1px solid var(--color-border);
  }
  .code-block code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 14px; white-space: nowrap; }
  .copy-btn {
    background: white; border: 1px solid var(--color-border); color: var(--color-text); padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 13px; flex-shrink: 0; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    font-weight: 500; transition: all 0.2s;
  }
  .copy-btn:hover { background: #F1F5F9; }
  .copy-btn.copied { background: var(--color-success); color: white; border-color: var(--color-success); }

  /* Prerequisites */
  .prereq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .prereq-card { background: var(--color-surface); padding: 20px; border-radius: var(--border-radius); display: flex; gap: 15px; align-items: flex-start; border: 1px solid var(--color-border); }
  .prereq-icon { font-size: 1.5rem; background: #F1F5F9; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; flex-shrink: 0; }
  .prereq-content h4 { margin-bottom: 4px; font-size: 15px; color: #0F172A; font-weight: 600; }
  .prereq-content p { font-size: 13px; color: var(--color-muted); margin: 0; line-height: 1.5; }

  /* FAQ */
  .faq { margin-top: 60px; }
  .faq h2 { margin-bottom: 24px; font-size: 24px; color: #0F172A; }
  .faq details {
    background: var(--color-surface); border-radius: var(--border-radius);
    margin-bottom: 12px; overflow: hidden; border: 1px solid var(--color-border);
  }
  .faq summary {
    padding: 20px; font-weight: 600; cursor: pointer; list-style: none;
    display: flex; justify-content: space-between; align-items: center; color: #0F172A;
  }
  .faq summary::-webkit-details-marker { display: none; }
  .faq summary::after { content: '+'; color: var(--color-muted); font-size: 1.5rem; }
  .faq details[open] summary::after { content: '−'; }
  .faq .faq-answer { padding: 0 20px 20px; color: var(--color-muted); line-height: 1.6; font-size: 15px; }

  /* Page Layout */
  .page-container { padding: 40px 20px; max-width: 800px; }
  .page-header { margin-bottom: 40px; }
  .page-header h1 { font-size: 36px; margin-bottom: 12px; font-weight: 800; color: #0F172A; letter-spacing: -1px; }
  .page-description { font-size: 18px; color: var(--color-muted); line-height: 1.6; }
  .page-content h2 { margin: 40px 0 16px; font-size: 24px; color: #0F172A; }
  .page-content p { margin-bottom: 16px; font-size: 15px; line-height: 1.7; color: #334155; }
  .page-content ul, .page-content ol { margin-bottom: 24px; padding-left: 24px; color: #334155; }
  .page-content li { margin-bottom: 8px; line-height: 1.6; }

  /* Connection Test Form / Mock Trial Widget */
  .test-form { background: var(--color-surface); color: var(--color-text); padding: 32px; border-radius: var(--border-radius); border: 1px solid var(--color-border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 13px; margin-bottom: 8px; font-weight: 600; color: #334155; }
  .form-control {
    width: 100%; padding: 12px 14px; background: #FFFFFF;
    border: 1px solid #CBD5E1; border-radius: 6px;
    color: var(--color-text); font-size: 14px; font-family: var(--font-family); transition: all 0.2s;
  }
  .form-control::placeholder { color: #94A3B8; }
  .form-control:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.15); }
  
  /* Trial Widget specifics */
  #trial-request-btn { transition: opacity 0.2s, transform 0.2s; cursor: pointer; }
  #trial-request-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .connection-tester .form-control:focus { outline: none; border-color: #3B82F6 !important; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25) !important; }
  .password-wrapper { position: relative; }
  .toggle-password {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--color-primary); font-weight: 600; font-size: 13px;
  }
  .test-result { margin-top: 24px; padding: 16px; border-radius: 6px; display: none; font-size: 14px; line-height: 1.5; }
  .test-result.success { background: #ECFDF5; border: 1px solid #A7F3D0; color: #065F46; display: block; }
  .test-result.error { background: #FEF2F2; border: 1px solid #FECACA; color: #991B1B; display: block; }
  .test-result h3 { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 16px; font-weight: 600; }
  .test-result.success h3 { color: #047857; }
  .test-result.error h3 { color: #B91C1C; }
  .test-result details { margin-top: 16px; background: #FFFFFF; padding: 12px; border-radius: 6px; color: var(--color-text); border: 1px solid var(--color-border); }
  .test-result summary { cursor: pointer; font-weight: 500; margin-bottom: 8px; color: #334155; }
  .test-result pre { background: #F8FAFC; color: #334155; padding: 16px; border-radius: 4px; border: 1px solid var(--color-border); overflow-x: auto; font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  /* Footer */
  .site-footer { background: white; padding: 48px 48px 24px; margin-top: 80px; border-top: 1px solid var(--color-border); }
  .footer-inner { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px; max-width: 1200px; margin-left: auto; margin-right: auto; }
  .footer-col h3 { margin-bottom: 20px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; opacity: 0.8; }
  .footer-col p, .footer-col a { color: var(--color-muted); font-size: 13px; }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 10px; }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 24px; border-top: 1px solid var(--color-border); color: var(--color-muted); font-size: 12px; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 768px) {
    .footer-bottom { flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
