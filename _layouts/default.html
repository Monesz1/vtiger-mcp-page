<!DOCTYPE html>
<html lang="{{ site.lang | default: 'hu' }}">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <!-- Main Content -->
  <main class="site-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    function copyToClipboard(btn, text) {
      function showSuccess() {
        const originalText = btn.innerText;
        btn.innerText = 'Másolva ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerText = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }

      if (navigator.clipboard && window.isSecureContext) {
        // Modern approach
        navigator.clipboard.writeText(text).then(showSuccess).catch(err => {
          console.error("Clipboard copy failed", err);
        });
      } else {
        // Fallback for older browsers or non-secure contexts
        const textarea = document.createElement('textarea');
        textarea.value = text;
        // Move outside of viewport to avoid scrolling or visible elements
        textarea.style.position = 'absolute';
        textarea.style.left = '-999999px';
        document.body.appendChild(textarea);
        textarea.select();
        
        try {
          const successful = document.execCommand('copy');
          if (successful) {
            showSuccess();
          } else {
            console.error("Fallback copy failed");
          }
        } catch (err) {
          console.error("Fallback copy error", err);
        } finally {
          document.body.removeChild(textarea);
        }
      }
    }

    async function triggerBackgroundApi(event, apiUrl, apiMethod, targetUrl) {
      event.preventDefault();
      const btn = event.currentTarget;
      const originalHtml = btn.innerHTML;
      
      // Update UI to show loading state
      btn.innerHTML = '<span class="spinner" style="display:inline-block; margin-right:8px; animation: spin 1s linear infinite;">↻</span> Kis türelmet...';
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.8';

      try {
        // Abort controller to prevent UI hanging if background API fails or is slow
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2500); // 2.5s maximum wait
        
        await fetch(apiUrl, {
          method: apiMethod || 'POST',
          mode: 'no-cors', // Ideal for "fire and forget" background webhooks to avoid CORS blocking
          signal: controller.signal
        });
        clearTimeout(timeoutId);
      } catch (error) {
        console.warn("Background API silent hook completed with timeout/error:", error);
      } finally {
        // Always redirect the user to the destination page, regardless of API ping tracking outcome
        window.location.href = targetUrl;
      }
    }
  </script>
</body>
</html>
