<!DOCTYPE html>
<html lang="{{ site.lang | default: 'hu' }}">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <!-- Main Content -->
  <main class="site-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    function copyToClipboard(btn, text) {
      function showSuccess() {
        const originalText = btn.innerText;
        btn.innerText = 'Másolva ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerText = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }

      if (navigator.clipboard && window.isSecureContext) {
        // Modern approach
        navigator.clipboard.writeText(text).then(showSuccess).catch(err => {
          console.error("Clipboard copy failed", err);
        });
      } else {
        // Fallback for older browsers or non-secure contexts
        const textarea = document.createElement('textarea');
        textarea.value = text;
        // Move outside of viewport to avoid scrolling or visible elements
        textarea.style.position = 'absolute';
        textarea.style.left = '-999999px';
        document.body.appendChild(textarea);
        textarea.select();
        
        try {
          const successful = document.execCommand('copy');
          if (successful) {
            showSuccess();
          } else {
            console.error("Fallback copy failed");
          }
        } catch (err) {
          console.error("Fallback copy error", err);
        } finally {
          document.body.removeChild(textarea);
        }
      }
    }

    async function testApiCall() {
      const btn = document.getElementById('api-trigger-btn');
      const resultDiv = document.getElementById('api-result');
      if (!btn || !resultDiv) return;

      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span class="spinner" style="display:inline-block; margin-right:8px; animation: spin 1s linear infinite;">↻</span> Csatlakozás...';
      btn.disabled = true;
      resultDiv.style.display = 'none';

      try {
        // Example GET request to a public mock API
        const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
        if (!response.ok) throw new Error('Hálózati hiba történt');
        
        const data = await response.json();
        
        resultDiv.style.display = 'block';
        resultDiv.style.backgroundColor = '#ECFDF5';
        resultDiv.style.color = '#065F46';
        resultDiv.style.border = '1px solid #A7F3D0';
        resultDiv.innerHTML = '<strong>✓ Sikeres API hívás!</strong><br>A REST szolgáltatás elérhető és válaszolt.';
      } catch (error) {
        resultDiv.style.display = 'block';
        resultDiv.style.backgroundColor = '#FEF2F2';
        resultDiv.style.color = '#991B1B';
        resultDiv.style.border = '1px solid #FECACA';
        resultDiv.innerHTML = `<strong>⚠️ Hiba történt</strong><br>${error.message}`;
      } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    }

    async function runConnectionTest() {
      const btn = document.getElementById('trial-request-btn');
      const wrapper = document.getElementById('test-result-wrapper');
      
      const companyName = document.getElementById('company_name')?.value;
      
      if (!companyName) {
        wrapper.style.display = 'block';
        wrapper.innerHTML = `
          <div class="test-result error animate-fade-in-up" style="display:block;">
            <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Hiba</h3>
            Kérlek töltsd ki legalább a cégnév mezőt az igényléshez!
          </div>`;
        return;
      }

      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span class="spinner" style="display:inline-block; margin-right:8px; animation: spin 1s linear infinite;">↻</span> Kis türelmet...';
      btn.disabled = true;
      wrapper.style.display = 'none';
      wrapper.innerHTML = '';

      try {
        // Mock server interaction delay to simulate license generation
        await new Promise(resolve => setTimeout(resolve, 800));
        
        // Generate mock license key
        const getSeg = () => Math.random().toString(36).substring(2, 6).toUpperCase();
        const licenseKey = 'MCRM-' + getSeg() + '-' + getSeg() + '-' + getSeg();
        
        wrapper.style.display = 'block';
        wrapper.innerHTML = `
          <div class="test-result success animate-fade-in-up" style="display:block; text-align: center; padding: 24px 16px;">
            <h3 style="justify-content: center; margin-bottom: 12px; font-size: 18px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Sikeres igénylés!</h3>
            <p style="margin-bottom: 16px; color: #065F46; font-size: 14px;">A rendszer legenerálta az Ön 14 napos próba licenckulcsát:</p>
            <div style="background: #FFFFFF; border: 2px dashed #34D399; padding: 12px 16px; font-size: 22px; font-family: ui-monospace, monospace; font-weight: 700; color: #047857; letter-spacing: 2px; border-radius: 8px; margin-bottom: 16px;">
              ${licenseKey}
            </div>
            <button class="btn btn-secondary copy-btn" onclick="copyToClipboard(this, '${licenseKey}')" style="font-size: 14px; padding: 8px 20px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              Kulcs másolása
            </button>
            <div style="margin-top: 16px; font-size: 12px; opacity: 0.8;">
              Másolja ki a kulcsot, és használja a beállítások menüpontban!
            </div>
          </div>`;
          
      } catch (error) {
        wrapper.style.display = 'block';
        wrapper.innerHTML = `
          <div class="test-result error animate-fade-in-up" style="display:block;">
            <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Hiba történt</h3>
            Hiba történt az igénylés során: ${error.message}
          </div>`;
      } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
