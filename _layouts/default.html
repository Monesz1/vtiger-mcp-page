<!DOCTYPE html>
<html lang="{{ site.lang | default: 'hu' }}">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <!-- Main Content -->
  <main class="site-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    function copyToClipboard(btn, text) {
      function showSuccess() {
        const originalText = btn.innerText;
        btn.innerText = 'Másolva ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerText = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }

      if (navigator.clipboard && window.isSecureContext) {
        // Modern approach
        navigator.clipboard.writeText(text).then(showSuccess).catch(err => {
          console.error("Clipboard copy failed", err);
        });
      } else {
        // Fallback for older browsers or non-secure contexts
        const textarea = document.createElement('textarea');
        textarea.value = text;
        // Move outside of viewport to avoid scrolling or visible elements
        textarea.style.position = 'absolute';
        textarea.style.left = '-999999px';
        document.body.appendChild(textarea);
        textarea.select();
        
        try {
          const successful = document.execCommand('copy');
          if (successful) {
            showSuccess();
          } else {
            console.error("Fallback copy failed");
          }
        } catch (err) {
          console.error("Fallback copy error", err);
        } finally {
          document.body.removeChild(textarea);
        }
      }
    }

    async function testApiCall() {
      const btn = document.getElementById('api-trigger-btn');
      const resultDiv = document.getElementById('api-result');
      if (!btn || !resultDiv) return;

      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span class="spinner" style="display:inline-block; margin-right:8px; animation: spin 1s linear infinite;">↻</span> Csatlakozás...';
      btn.disabled = true;
      resultDiv.style.display = 'none';

      try {
        // Example GET request to a public mock API
        const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
        if (!response.ok) throw new Error('Hálózati hiba történt');
        
        const data = await response.json();
        
        resultDiv.style.display = 'block';
        resultDiv.style.backgroundColor = '#ECFDF5';
        resultDiv.style.color = '#065F46';
        resultDiv.style.border = '1px solid #A7F3D0';
        resultDiv.innerHTML = '<strong>✓ Sikeres API hívás!</strong><br>A REST szolgáltatás elérhető és válaszolt.';
      } catch (error) {
        resultDiv.style.display = 'block';
        resultDiv.style.backgroundColor = '#FEF2F2';
        resultDiv.style.color = '#991B1B';
        resultDiv.style.border = '1px solid #FECACA';
        resultDiv.innerHTML = `<strong>⚠️ Hiba történt</strong><br>${error.message}`;
      } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    }

    async function runConnectionTest() {
      const btn = document.getElementById('test-connection-btn');
      const wrapper = document.getElementById('test-result-wrapper');
      
      const baseUrl = document.getElementById('baseurl')?.value;
      const apiKey = document.getElementById('apikey')?.value;
      const systemId = document.getElementById('systemid')?.value;
      
      if (!baseUrl || !apiKey || !systemId) {
        wrapper.style.display = 'block';
        wrapper.innerHTML = `
          <div class="test-result error animate-fade-in-up" style="display:block;">
            <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Hiba</h3>
            Kérlek tölts ki minden mezőt!
          </div>`;
        return;
      }

      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span class="spinner" style="display:inline-block; margin-right:8px; animation: spin 1s linear infinite;">↻</span> Tesztelés folyamatban...';
      btn.disabled = true;
      wrapper.style.display = 'none';
      wrapper.innerHTML = '';

      try {
        // Prepare Basic Auth token securely matching standard integration practices
        const credentials = btoa(`${systemId}:${apiKey}`);
        
        // Use proxy or direct fetch depending on target API limitations
        const cleanBaseUrl = baseUrl.replace(/\/$/, '');
        const targetUrl = `${cleanBaseUrl}/Contact`;
        
        // Fails if target has no broad CORS config configured on endpoint
        const response = await fetch(targetUrl, {
          method: 'GET',
          headers: {
            'Authorization': `Basic ${credentials}`,
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          }
        });
        
        if (!response.ok) {
          throw new Error(`Szerver válasz: ${response.status} ${response.statusText}`);
        }
        
        const data = await response.json();
        
        wrapper.style.display = 'block';
        wrapper.innerHTML = `
          <div class="test-result success animate-fade-in-up" style="display:block;">
            <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Kapcsolat sikeres</h3>
            A megadott API adatokkal a csatlakozás megtörtént.
            <details>
              <summary>API Válasz Részletek</summary>
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </details>
          </div>`;
          
      } catch (error) {
        wrapper.style.display = 'block';
        wrapper.innerHTML = `
          <div class="test-result error animate-fade-in-up" style="display:block;">
            <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Kapcsolódási hiba</h3>
            API hiba történt: ${error.message}
            <div style="margin-top: 10px; font-size: 13px; opacity: 0.9;">
              <strong>Figyelem:</strong> Ha az API végpont nem támogatja a CORS-t (Cross-Origin Resource Sharing), a böngésző biztonsági okokból blokkolja a hívást weboldalról indítva. Az MCP környezetben szerveroldalon futva ez a korlátozás nem lesz jelen.
            </div>
          </div>`;
      } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
