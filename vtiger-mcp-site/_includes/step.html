<div class="step-card">
  <div class="step-number">{{ include.number }}</div>
  <div class="step-content">
    <h3>{{ include.title }}</h3>
    <p>{{ include.body }}</p>
    {% if include.code %}
    <div class="code-block">
      <code>{{ include.code }}</code>
      <button class="copy-btn" onclick="copyToClipboard(this, '{{ include.code | escape }}')">Másolás</button>
    </div>
    {% endif %}
    {% if include.image %}
    <img src="{{ include.image | relative_url }}" alt="{{ include.title }}">
    {% endif %}
  </div>
</div>
