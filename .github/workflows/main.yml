name: Provision License File

on:
  workflow_dispatch:
    inputs:
      companyName:
        description: "Company name"
        required: true
        type: string
      licenseKey:
        description: "License key"
        required: true
        type: string
      contactName:
        description: "Contact person name"
        required: true
        type: string
      phone:
        description: "Phone number"
        required: true
        type: string
      email:
        description: "Email address"
        required: true
        type: string
      userCount:
        description: "Number of users"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Prepare SSH folder
        run: |
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh

      - name: Add VPS host to known_hosts
        run: |
          sh-keyscan -H "${{ secrets.VPS1 }}" >> ~/.ssh/known_hosts

      - name: Test VPS connection
        run: |
          sshpass -p "${{ secrets.VPS1_pw }}" \
          ssh -o StrictHostKeyChecking=no \
          "${{ secrets.VPS1_docker }}@${{ secrets.VPS1 }}" "echo 'Connection OK'"

      - name: Create license file on VPS
        run: |
          FILE_PATH="/srv/shared/INTRA/mcp/TST/users/${{ github.event.inputs.licenseKey }}"

          sshpass -p "${{ secrets.VPS1_pw }}" ssh -o StrictHostKeyChecking=no \
          "${{ secrets.VPS1_docker }}@${{ secrets.VPS1 }}" \
          "echo 'licenseKey: ${{ github.event.inputs.licenseKey }}' > $FILE_PATH"

      - name: Append company/user details to file
        run: |
          FILE_PATH="/srv/shared/INTRA/mcp/TST/users/${{ github.event.inputs.licenseKey }}"

          sshpass -p "${{ secrets.VPS1_pw }}" ssh -o StrictHostKeyChecking=no \
          "${{ secrets.VPS1_docker }}@${{ secrets.VPS1 }}" \
          \"echo 'companyName: ${{ github.event.inputs.companyName }}' >> $FILE_PATH\"

          sshpass -p "${{ secrets.VPS1_pw }}" ssh -o StrictHostKeyChecking=no \
          "${{ secrets.VPS1_docker }}@${{ secrets.VPS1 }}" \
          \"echo 'contactName: ${{ github.event.inputs.contactName }}' >> $FILE_PATH\"

          sshpass -p "${{ secrets.VPS1_pw }}" ssh -o StrictHostKeyChecking=no \
          "${{ secrets.VPS1_docker }}@${{ secrets.VPS1 }}" \
          \"echo 'phone: ${{ github.event.inputs.phone }}' >> $FILE_PATH\"

          sshpass -p "${{ secrets.VPS1_pw }}" ssh -o StrictHostKeyChecking=no \
          "${{ secrets.VPS1_docker }}@${{ secrets.VPS1 }}" \
          \"echo 'email: ${{ github.event.inputs.email }}' >> $FILE_PATH\"

          sshpass -p "${{ secrets.VPS1_pw }}" ssh -o StrictHostKeyChecking=no \
          "${{ secrets.VPS1_docker }}@${{ secrets.VPS1 }}" \
          \"echo 'userCount: ${{ github.event.inputs.userCount }}' >> $FILE_PATH\"
